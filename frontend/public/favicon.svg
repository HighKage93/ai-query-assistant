<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#1a1a2e"/>

  <!-- Glow effect behind the spark -->
  <circle cx="32" cy="28" r="16" fill="#4f46e5" opacity="0.15"/>

  <!-- Lightning bolt / spark icon -->
  <polygon
    points="36,12 26,32 32,32 28,52 42,28 35,28"
    fill="#4f46e5"
    stroke="#818cf8"
    stroke-width="1"
    stroke-linejoin="round"
  />

  <!-- Small dot accent -->
  <circle cx="44" cy="16" r="3" fill="#818cf8" opacity="0.8"/>
</svg>
